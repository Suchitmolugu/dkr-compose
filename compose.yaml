---
services:
  httpd:
    container_name: cont1
    image: httpd
    ports:
      - "1111:80"
    volumes:
      - ht-volume:/usr/local/apache2/htdocs
    networks:
      - ht-nw
      - ng-nw
  nginx:
    container_name: cont2
    image: nginx
    ports:
      - "2222:80"
    volumes:
      - ng-volume:/usr/share/nginx/html
    networks:
      - ng-nw
      - ht-nw

volumes:
  ht-volume:
  ng-volume:

networks:
  ht-nw:
    driver: bridge
  ng-nw:
    driver: bridge
